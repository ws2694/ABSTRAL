app = "abstral"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8420
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "abstral_data"
  destination = "/data"

[env]
  DATA_DIR = "/data"
  PORT = "8420"

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/api/status"
    port = 8420
    timeout = "5s"
    type = "http"
